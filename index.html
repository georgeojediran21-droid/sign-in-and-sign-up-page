<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Modern Authentication</title>

  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link 
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- Google Font -->
  <link 
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" 
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      background:
      linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
      url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2070&auto=format&fit=crop')
      center/cover no-repeat;
    }

    .auth-container{
      width:100%;
      max-width:1000px;
      border-radius:25px;
      overflow:hidden;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,0.2);
      box-shadow:0 15px 40px rgba(0,0,0,0.3);
    }

    .left-side{
      background:linear-gradient(135deg,#4e54c8,#8f94fb);
      color:white;
      padding:60px 40px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      height:100%;
    }

    .left-side h1{
      font-size:3rem;
      font-weight:700;
      margin-bottom:20px;
    }

    .left-side p{
      line-height:1.8;
      opacity:0.9;
    }

    .form-section{
      background:white;
      padding:50px 40px;
    }

    .form-title{
      font-size:2rem;
      font-weight:700;
      margin-bottom:10px;
    }

    .form-subtitle{
      color:#777;
      margin-bottom:30px;
    }

    .input-group-text{
      border:none;
      background:#f1f3f6;
    }

    .form-control{
      border:none;
      background:#f1f3f6;
      padding:14px;
    }

    .form-control:focus{
      box-shadow:none;
      background:#f1f3f6;
    }

    .custom-btn{
      background:linear-gradient(135deg,#4e54c8,#8f94fb);
      border:none;
      padding:14px;
      border-radius:10px;
      font-weight:600;
      transition:0.3s;
    }

    .custom-btn:hover{
      transform:translateY(-2px);
    }

    .social-btn{
      padding:12px 20px;
      border-radius:10px;
      font-weight:500;
      text-decoration:none;
      display:flex;
      align-items:center;
      gap:10px;
      transition:0.3s;
    }

    .social-btn:hover{
      transform:translateY(-2px);
    }

    .toggle-link{
      color:#4e54c8;
      cursor:pointer;
      font-weight:600;
    }

    .toggle-link:hover{
      text-decoration:underline;
    }

    .form-box{
      display:none;
      animation:fade 0.4s ease;
    }

    .form-box.active{
      display:block;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(10px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:768px){

      .left-side{
        display:none;
      }

      .form-section{
        padding:35px 25px;
      }

      .form-title{
        font-size:1.7rem;
      }
    }

  </style>

</head>
<body>

  <div class="container">

    <div class="row auth-container">

      <!-- LEFT SIDE -->
      <div class="col-lg-5 left-side">

        <h1>Welcome</h1>

        <p>
          Create beautiful and responsive authentication pages 
          using Bootstrap, HTML, CSS and JavaScript.
        </p>

        <img 
          src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
          class="img-fluid mt-4"
          width="220"
        >

      </div>

      <!-- RIGHT SIDE -->
      <div class="col-lg-7 form-section">

        <!-- SIGN IN -->
        <div class="form-box active" id="signinBox">

          <h2 class="form-title">
            Sign In
          </h2>

          <p class="form-subtitle">
            Login to continue
          </p>

          <!-- EMAIL -->
          <div class="mb-3 input-group">

            <span class="input-group-text">
              <i class="bi bi-envelope-fill"></i>
            </span>

            <input 
              type="email"
              class="form-control"
              id="signinEmail"
              placeholder="Enter your email"
            >

          </div>

          <!-- PASSWORD -->
          <div class="mb-3 input-group">

            <span class="input-group-text">
              <i class="bi bi-lock-fill"></i>
            </span>

            <input 
              type="password"
              class="form-control"
              id="signinPassword"
              placeholder="Enter your password"
            >

          </div>

          <!-- BUTTON -->
          <button 
            class="btn btn-primary custom-btn w-100 mb-4"
            onclick="signIn()"
          >
            Sign In
          </button>

          <!-- CONTINUE WITH -->
          <div class="text-center mb-4">

            <p class="text-muted mb-3">
              Continue with
            </p>

            <div class="d-flex justify-content-center gap-3 flex-wrap">

              <!-- GOOGLE -->
              <a 
                href="https://accounts.google.com/"
                target="_blank"
                class="social-btn btn btn-light border shadow-sm"
              >
                <i class="bi bi-google text-danger"></i>
                Gmail
              </a>

              <!-- GITHUB -->
              <a 
                href="https://github.com/login"
                target="_blank"
                class="social-btn btn btn-dark"
              >
                <i class="bi bi-github"></i>
                GitHub
              </a>

              <!-- FACEBOOK -->
              <a 
                href="https://facebook.com/login"
                target="_blank"
                class="social-btn btn btn-primary"
              >
                <i class="bi bi-facebook"></i>
                Facebook
              </a>

            </div>

          </div>

          <!-- MESSAGE -->
          <div id="signinMessage"></div>

          <!-- TOGGLE -->
          <div class="text-center mt-4">

            Don't have an account?

            <span 
              class="toggle-link"
              onclick="showSignup()"
            >
              Sign Up
            </span>

          </div>

        </div>

        <!-- SIGN UP -->
        <div class="form-box" id="signupBox">

          <h2 class="form-title">
            Create Account
          </h2>

          <p class="form-subtitle">
            Register your new account
          </p>

          <!-- NAME -->
          <div class="mb-3 input-group">

            <span class="input-group-text">
              <i class="bi bi-person-fill"></i>
            </span>

            <input 
              type="text"
              class="form-control"
              id="signupName"
              placeholder="Full Name"
            >

          </div>

          <!-- EMAIL -->
          <div class="mb-3 input-group">

            <span class="input-group-text">
              <i class="bi bi-envelope-fill"></i>
            </span>

            <input 
              type="email"
              class="form-control"
              id="signupEmail"
              placeholder="Email Address"
            >

          </div>

          <!-- PASSWORD -->
          <div class="mb-3 input-group">

            <span class="input-group-text">
              <i class="bi bi-lock-fill"></i>
            </span>

            <input 
              type="password"
              class="form-control"
              id="signupPassword"
              placeholder="Create Password"
            >

          </div>

          <!-- BUTTON -->
          <button 
            class="btn btn-primary custom-btn w-100 mb-3"
            onclick="signUp()"
          >
            Create Account
          </button>

          <!-- MESSAGE -->
          <div id="signupMessage"></div>

          <!-- TOGGLE -->
          <div class="text-center mt-4">

            Already have an account?

            <span 
              class="toggle-link"
              onclick="showSignin()"
            >
              Sign In
            </span>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>

    // SHOW SIGNUP
    function showSignup(){

      document.getElementById("signinBox")
      .classList.remove("active");

      document.getElementById("signupBox")
      .classList.add("active");
    }

    // SHOW SIGNIN
    function showSignin(){

      document.getElementById("signupBox")
      .classList.remove("active");

      document.getElementById("signinBox")
      .classList.add("active");
    }

    // SHOW MESSAGE
    function showMessage(type, message, boxId){

      document.getElementById(boxId).innerHTML = `

        <div class="alert alert-${type} alert-dismissible fade show" role="alert">

          ${message}

          <button 
            type="button"
            class="btn-close"
            data-bs-dismiss="alert">
          </button>

        </div>

      `;
    }

    // SIGN UP
    function signUp(){

      const name = document.getElementById("signupName").value;

      const email = document.getElementById("signupEmail").value;

      const password = document.getElementById("signupPassword").value;

      if(name === "" || email === "" || password === ""){

        showMessage(
          "danger",
          "Please fill all fields!",
          "signupMessage"
        );

        return;
      }

      // SAVE DATA
      localStorage.setItem("userName", name);

      localStorage.setItem("userEmail", email);

      localStorage.setItem("userPassword", password);

      // SUCCESS MESSAGE
      showMessage(
        "success",
        "Registration Successful!",
        "signupMessage"
      );

      // CLEAR INPUTS
      document.getElementById("signupName").value = "";

      document.getElementById("signupEmail").value = "";

      document.getElementById("signupPassword").value = "";

      // SWITCH TO LOGIN
      setTimeout(() => {

        showSignin();

      }, 2000);
    }

    // SIGN IN
    function signIn(){

      const email = document.getElementById("signinEmail").value;

      const password = document.getElementById("signinPassword").value;

      const savedEmail = localStorage.getItem("userEmail");

      const savedPassword = localStorage.getItem("userPassword");

      if(email === savedEmail && password === savedPassword){

        showMessage(
          "success",
          "Login Successful!",
          "signinMessage"
        );

      }else{

        showMessage(
          "danger",
          "Invalid Email or Password!",
          "signinMessage"
        );
      }
    }

  </script>

</body>
</html>
